<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoWs Minimap Renderer EZ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>var SOCKET_IO_PATH = '{{ socket_io_path or "/socket.io" }}';</script>
</head>
<body>
    <div class="container">
        <!-- 更新ステータス表示エリア（常時表示） -->
        <div id="updateStatusBar" class="update-status-bar">
            <span id="updateStatusIcon" class="update-status-icon">⏳</span>
            <span id="updateStatusText">ゲームバージョン対応を確認中...</span>
        </div>

        <!-- 更新通知バナー（更新がある場合のみ表示） -->
        <div id="updateBanner" class="update-banner hidden">
            <div class="update-content">
                <span id="updateMessage">新しいゲームバージョン対応が利用可能です</span>
                <div class="update-buttons">
                    <button id="updateBtn" class="btn btn-update">更新する</button>
                    <button id="dismissBtn" class="btn btn-dismiss">後で</button>
                </div>
            </div>
            <div id="updateProgress" class="update-progress hidden">
                <div class="update-progress-bar">
                    <div id="updateProgressFill" class="update-progress-fill"></div>
                </div>
                <span id="updateProgressText">0%</span>
            </div>
        </div>

        <div class="header">
            <h1>⚓ WoWs Minimap Renderer EZ</h1>
            <p>リプレイファイルから戦闘を再現</p>
        </div>

        <div class="upload-section card">
            <h2>リプレイファイルを選択</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="file-input-wrapper">
                    <label for="replayFile" class="file-label">
                        ファイルを選択
                    </label>
                    <input type="file" id="replayFile" name="replay_file" accept=".wowsreplay" required>
                </div>
                <p id="fileName" class="file-name"></p>
                <button type="submit" class="btn btn-primary">動画生成を開始</button>
            </form>
        </div>

        <div id="progressSection" class="progress-section card hidden">
            <h2>処理中</h2>
            <div class="progress-bar-container">
                <div id="progressFill" class="progress-bar-fill"></div>
            </div>
            <p id="progressText" class="progress-text">0%</p>
        </div>

        <div id="resultSection" class="result-section card hidden">
            <h2>生成完了</h2>
            <div class="video-container">
                <video id="videoPlayer" controls>
                    <source id="videoSource" src="" type="video/mp4">
                    お使いのブラウザは動画再生に対応していません。
                </video>
            </div>
            <div class="button-group">
                <a id="downloadBtn" href="#" download class="btn btn-primary">ダウンロード</a>
                <button id="resetBtn" class="btn btn-secondary">別のファイルを処理</button>
            </div>
        </div>

        <div id="errorSection" class="error-section card hidden">
            <h2>エラーが発生しました</h2>
            <div id="errorMessage" class="error-message"></div>
            <button id="errorResetBtn" class="btn btn-secondary">やり直す</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
