name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps -r requirements.txt

      - name: Write VERSION file
        run: git rev-parse HEAD | Out-File -Encoding ascii -NoNewline VERSION
        shell: pwsh

      - name: Build with PyInstaller
        run: pyinstaller minimap_renderer_gui.spec

      - name: Archive build output
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "WoWsMinimapRenderer-$version-windows.zip"
          Copy-Item VERSION dist\WoWsMinimapRenderer\VERSION
          Compress-Archive -Path dist\WoWsMinimapRenderer\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WoWs Minimap Renderer ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ env.ZIP_NAME }}
